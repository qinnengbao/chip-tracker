name: chip_tracking
description: 筹码追踪软件 - 专业股票筹码分布分析工具

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  provider: ^6.1.1

  # 网络请求
  dio: ^5.4.0

  # 图表库
  fl_chart: ^0.66.0

  # 本地存储
  shared_preferences: ^2.2.2

  # UI组件
  cupertino_icons: ^1.0.6

  # 工具库
  intl: ^0.18.1
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  # 资源文件
  assets:
    - assets/images/
